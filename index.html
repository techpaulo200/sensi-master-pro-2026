<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensi Master 2026</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    margin-top: 20px;
    font-size: 28px;
}

.card {
    background: rgba(255, 255, 255, 0.1);
    padding: 15px;
    margin: 15px auto;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
}

input[type="range"] {
    width: 100%;
}

button {
    background: #00ffcc;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
}

button:hover {
    background: #00ccaa;
}

#resultado {
    margin-top: 20px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <h1>🔥 Sensi Master 2026</h1>
    <p>Encontre a sensibilidade perfeita para qualquer celular</p>

    <div class="card">
        <label>Sensibilidade Geral</label>
        <input type="range" id="geral" min="0" max="200" value="100">
        <span id="valorGeral">100</span>
    </div>

    <div class="card">
        <label>Sensibilidade ADS</label>
        <input type="range" id="ads" min="0" max="200" value="90">
        <span id="valorAds">90</span>
    </div>

    <div class="card">
        <label>Sensibilidade Sniper</label>
        <input type="range" id="sniper" min="0" max="200" value="80">
        <span id="valorSniper">80</span>
    </div>

    <button onclick="salvarConfig()">Salvar Configuração</button>

    <div id="resultado"></div>
</div>

<script>
const geral = document.getElementById("geral");
const ads = document.getElementById("ads");
const sniper = document.getElementById("sniper");

const valorGeral = document.getElementById("valorGeral");
const valorAds = document.getElementById("valorAds");
const valorSniper = document.getElementById("valorSniper");

geral.oninput = () => valorGeral.innerText = geral.value;
ads.oninput = () => valorAds.innerText = ads.value;
sniper.oninput = () => valorSniper.innerText = sniper.value;

function salvarConfig() {
    const config = {
        geral: geral.value,
        ads: ads.value,
        sniper: sniper.value
    };

    localStorage.setItem("sensiMasterConfig", JSON.stringify(config));

    document.getElementById("resultado").innerText =
        "✅ Configuração salva com sucesso!";
}

window.onload = function() {
    const saved = localStorage.getItem("sensiMasterConfig");
    if(saved){
        const config = JSON.parse(saved);
        geral.value = config.geral;
        ads.value = config.ads;
        sniper.value = config.sniper;

        valorGeral.innerText = config.geral;
        valorAds.innerText = config.ads;
        valorSniper.innerText = config.sniper;
    }
}
</script>

</body>
</html>
